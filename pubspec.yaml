name: cosmetics
description: "A new Flutter project."
publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.0
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  gap: ^3.0.1
  flutter_screenutil: ^5.9.3
  lottie: ^3.3.2
  google_maps_flutter: ^2.17.0
  pin_code_fields: ^8.0.1
  circular_countdown_timer: ^0.2.4
  animate_do: ^5.1.0
  shared_preferences: ^2.5.5
  dio: ^5.9.2
  carousel_slider: ^5.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lotties/


